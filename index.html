<!DOCTYPE html>
<html lang="br-pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400..800&family=Leckerli+One&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css/index.css">
    <title>Formulário de convite</title>
</head>

<body>
    <div class="container">
        <aside>
            <div class="banner">
                <img src="assets/Background.png" alt="Bolo de festa" class="cake">
                <img src="assets/icons/Logo.svg" alt="Ícone" class="icon">
                <h1>Festivite</h1>
                <h2>Crie um convite digital para o seu evento</h2>
            </div>
        </aside>
        <main>
            <div class="form">
                <fieldset class="about">
                    <strong>Crie seu convite</strong>
                    <figure>
                        <img src="assets/icons/calendar.png" alt="Calendario">
                        <figcaption>Sobre o evento</figcaption>
                    </figure>

                </fieldset>
            </div>

        </main>

    </div>
</body>

</html>
