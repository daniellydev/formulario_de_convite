<!DOCTYPE html>
<html lang="br-pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400..800&family=Leckerli+One&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles/index.css">
    <title>Formulário de convite</title>
</head>

<body>
    <div id="app">
        <aside class="aside-container">
            <div class="banner">
                <img src="assets/Background.png" alt="Bolo de festa" class="img">
                <img src="assets/icons/Logo.svg" alt="Ícone" class="icon">
                <h1>Festivite</h1>
                <h2>Crie um convite digital para o seu evento</h2>
            </div>
        </aside>
        <main class="main-container">
            <fieldset class="about">
                <strong>Crie seu convite</strong>
                <figure class="icons">
                    <img src="assets/icons/calendar.svg" alt="Calendario">
                    <figcaption>Sobre o evento</figcaption>
                </figure>
                <div class="input-wrapper">
                    <label for="titulo">Título</label>
                    <input type="text" id="titulo" name="titulo" placeholder="Nome do evento">
                </div>
                <div class="flex">
                    <div class="flex-1">
                        <div class="input-wrapper flex-1">
                            <label for="inicio">Início</label>
                            <input type="datetime-local" id="inicio" name="inicio">
                        </div>
                    </div>
                    <div class="flex-2">
                        <div class="input-wrapper">
                            <label for="fim">Fim</label>
                            <input type="datetime-local" id="fim" name="fim">
                        </div>
                    </div>

                </div>
                <div class="flex">

                    <div class="input-wrapper flex-1">
                        <input type="radio" name="tipo" id="presencial" checked>
                        <label for="presencial">
                            <img src="./assets/icons/building.svg" alt="">
                            <span>Presencial</span>
                        </label>

                        <input type="radio" name="tipo" id="online">
                        <label for="online">
                            <img src="./assets/icons/video.svg" alt="">
                            <span>Online</span>
                        </label>
                    </div>
                    <div class="flex-1">
                        <div class="input-wrapper flex-2">
                            <label for="local">Local</label>
                            <input type="text" id="local" name="local" placeholder="Link ou endereço">
                        </div>
                    </div>
                </div>
                <div class="textarea-wrapper">
                    <label for="info">Descrição</label>
                    <textarea name="info" id="info" cols="30" rows="5"
                        placeholder="Escreva sobre os detalhes do evento"></textarea>
                </div>
            </fieldset>
            <fieldset class="color">
                <figure class="icons">
                    <img src="assets/icons/pincel.svg" alt="Pincel">
                    <figcaption>Personalização</figcaption>
                </figure>
                <div class="input-wrapper flex">
                    <input type="radio" name="cor" id="azul">
                    <label for="azul" class="cor azul"></label>
                </div>
                <div class="input-wrapper">
                    <input type="radio" name="cor" id="azul-escuro">
                    <label for="azul-escuro" class="cor azul-escuro"></label>
                </div>
                <div class="input-wrapper">
                    <input type="radio" name="cor" id="roxo">
                    <label for="roxo" class="cor roxo"></label>
                </div>
                <div class="input-wrapper">
                    <input type="radio" name="cor" id="rosa">
                    <label for="rosa" class="cor rosa"></label>
                </div>
                <div class="input-wrapper">
                    <input type="radio" name="cor" id="coral">
                    <label for="coral" class="cor coral"></label>
                </div>
                <div class="input-wrapper">
                    <input type="radio" name="cor" id="vermelho">
                    <label for="vermelho" class="cor vermelho"></label>
                </div>
                <div class="input-wrapper">
                    <input type="radio" name="cor" id="laranja">
                    <label for="laranja" class="cor laranja"></label>
                </div>
                <div class="input-wrapper">
                    <input type="radio" name="cor" id="laranja">
                    <label for="laranja" class="cor laranja-claro"></label>
                </div>
                <div class="input-wrapper">
                    <input type="radio" name="cor" id="neon">
                    <label for="neon" class="cor neon"></label>
                </div>
                <div class="input-wrapper">
                    <input type="radio" name="cor" id="verde">
                    <label for="verde" class="cor verde"></label>
                </div>
                <div class="input-wrapper">
                    <input type="radio" name="cor" id="turquesa">
                    <label for="turquesa" class="cor turquesa"></label>
                </div>
                
            </fieldset>

        </main>

    </div>
</body>

</html>
